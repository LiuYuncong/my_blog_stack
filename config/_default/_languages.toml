# --- 多语言设置 ---
# 如果你想正式启用此配置，请确保文件名已重命名为 languages.toml

[zh-cn]
    languageName      = "简体中文"       # 在语言切换菜单中显示的名称
    languagedirection = "ltr"            # 阅读方向：从左到右 (Left-to-Right)
    title             = "小葱的学术基站"  # 针对中文环境的网站标题
    weight            = 1                # 排序权重，数字越小越靠前
